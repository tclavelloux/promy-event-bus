name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        id: test
        run: |
          go test -v -race -failfast -coverpkg=./... -covermode=atomic -coverprofile=coverage.tmp.out -count=1 ./...
          grep -v "examples" coverage.tmp.out | grep -v "testdata" > coverage.out
          echo "total=$(go tool cover -func coverage.out | grep total | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Add coverage comment
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE="github.com/tclavelloux/promy-event-bus/"

          # Per-package summary (sorted by coverage ascending)
          PKG_REPORT=$(go tool cover -func coverage.out \
            | grep -v "^total:" \
            | sed "s|${MODULE}||" \
            | awk -F: '{split($0,a,"\t"); pkg=$1; sub(/\/[^/]*$/, "", pkg); cov=a[length(a)]} {seen[pkg]++; sum[pkg]+=cov+0} END {for(p in seen) printf "%s %s\n", p, sprintf("%.1f%%", sum[p]/seen[p])}' \
            | sort -t' ' -k2 -n \
            | column -t)

          # Low-coverage functions (< 50%) excluding mocks
          LOW=$(go tool cover -func coverage.out \
            | grep -v "^total:" \
            | grep -v "testutil" \
            | sed "s|${MODULE}||" \
            | awk '{pct=$NF+0; if(pct > 0 && pct < 50) print}' \
            | sed 's/\t\+/ /g' \
            | column -t \
            | head -20)

          BODY=$(cat <<EOF
          ### Coverage Report — ${{ steps.test.outputs.total }}

          <details>
          <summary>Per-package breakdown</summary>

          \`\`\`
          ${PKG_REPORT}
          \`\`\`

          </details>

          <details>
          <summary>Low coverage functions (&lt; 50%)</summary>

          \`\`\`
          ${LOW:-All functions above 50% ✓}
          \`\`\`

          </details>
          EOF
          )

          # Delete previous coverage comments
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("### Coverage Report")) | .id' | \
            xargs -I{} gh api -X DELETE "repos/${{ github.repository }}/issues/comments/{}" 2>/dev/null || true
          # Post new comment
          gh pr comment ${{ github.event.pull_request.number }} --body "${BODY}"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
